<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); }
  .wrap { display: grid; grid-template-columns: 300px 1fr; gap: 22px; align-items: start; }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Panel, Metric, SettingsRow, Select, Field } = window.LocalTranslateHubDesignSystem_32566a;
    function Demo() {
      return (
        <>
          <Panel title="runtime">
            <Metric icon="ri-database-2-line" label="provider" value="ollama" />
            <Metric icon="ri-cpu-line" label="model" value="qwen2.5:7b" />
            <Metric icon="ri-file-text-line" label="ocr" value="windows-ocr" />
            <Metric icon="ri-server-line" label="cache" value="warm" />
          </Panel>
          <div style={{ border: "1px solid var(--border-hairline)", borderRadius: "var(--radius-lg)", background: "var(--surface-panel)", padding: "4px 18px 12px" }}>
            <div style={{ padding: "14px 0 8px", fontSize: "15px", fontWeight: 640, color: "var(--text-body)" }}>Translation defaults</div>
            <SettingsRow
              title="Prompt mode"
              description="Prompt preset used when the request does not override mode."
              control={<Field label="mode"><Select options={["faithful", "natural", "literal"]} /></Field>}
            />
            <SettingsRow
              title="Glossary"
              description="Optional local glossary file applied to translation requests."
              last
              control={<Field label="glossary"><Select options={["none", "game-terms.csv"]} /></Field>}
            />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
