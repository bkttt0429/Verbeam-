<!-- @dsCard group="Colors" viewport="700x170" name="Text & state on dark" subtitle="Text ramp and active/notice tints in context" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-app);display:grid;gap:12px}
  .text-row{display:flex;flex-wrap:wrap;gap:18px;align-items:baseline;font-family:var(--font-sans);font-size:15px}
  .text-row span small{display:block;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:3px}
  .tints{display:flex;gap:10px;flex-wrap:wrap}
  .tint{font-family:var(--font-mono);font-size:11px;padding:6px 10px;border-radius:var(--radius-md)}
  .active{background:var(--vb-active-bg);color:var(--vb-blue);box-shadow:var(--ring-active)}
  .notice{background:var(--vb-notice-bg);color:var(--vb-notice-fg);border:1px solid var(--vb-notice-border)}
  .hover{background:var(--vb-hover);color:var(--text-body)}
</style></head><body>
  <div class="text-row">
    <span style="color:var(--vb-text-strong)">text-strong<small>#f1f1f1</small></span>
    <span style="color:var(--vb-text)">text<small>#e8e8e8</small></span>
    <span style="color:var(--vb-muted)">muted<small>#7a7a7a</small></span>
    <span style="color:var(--vb-slate)">meta slate<small>#94a3b8</small></span>
    <span style="color:var(--vb-faint)">faint<small>#555555</small></span>
  </div>
  <div class="tints">
    <span class="tint active">active tab fill</span>
    <span class="tint hover">hover wash</span>
    <span class="tint notice">amber notice</span>
  </div>
</body></html>
