<!-- @dsCard group="Brand" viewport="700x200" name="Iconography — RemixIcon 4.2.0" subtitle="The only icon source; muted line glyphs, no emoji" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
<style>
  body{margin:0;padding:20px;background:var(--surface-app)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px}
  .ic{display:grid;gap:6px;justify-items:center;text-align:center}
  .ic i{font-size:20px;color:var(--vb-muted)}
  .ic span{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);line-height:1.3}
</style></head><body>
  <div class="grid">
    <div class="ic"><i class="ri-terminal-box-line"></i><span>terminal-box</span></div>
    <div class="ic"><i class="ri-broadcast-line"></i><span>broadcast</span></div>
    <div class="ic"><i class="ri-projector-line"></i><span>projector</span></div>
    <div class="ic"><i class="ri-translate-2"></i><span>translate-2</span></div>
    <div class="ic"><i class="ri-scan-2-line"></i><span>scan-2</span></div>
    <div class="ic"><i class="ri-bubble-chart-line"></i><span>bubble-chart</span></div>
    <div class="ic"><i class="ri-mic-line"></i><span>mic</span></div>
    <div class="ic"><i class="ri-voiceprint-line"></i><span>voiceprint</span></div>
    <div class="ic"><i class="ri-focus-3-line"></i><span>focus-3</span></div>
    <div class="ic"><i class="ri-settings-3-line"></i><span>settings-3</span></div>
    <div class="ic"><i class="ri-database-2-line"></i><span>database-2</span></div>
    <div class="ic"><i class="ri-cpu-line"></i><span>cpu</span></div>
    <div class="ic"><i class="ri-file-text-line"></i><span>file-text</span></div>
    <div class="ic"><i class="ri-sound-module-line"></i><span>sound-module</span></div>
    <div class="ic"><i class="ri-server-line"></i><span>server</span></div>
    <div class="ic"><i class="ri-pulse-line"></i><span>pulse</span></div>
  </div>
</body></html>
