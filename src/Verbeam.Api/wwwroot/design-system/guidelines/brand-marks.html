<!-- @dsCard group="Brand" viewport="700x160" name="Brand marks" subtitle="Typographic only — OC mark, Verbeam wordmark, LTH badge" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-app);display:flex;gap:30px;align-items:center;flex-wrap:wrap}
  .brand{display:inline-flex;align-items:center;gap:8px;color:#f1f1f1;font-size:14px;font-weight:650;font-family:var(--font-mono)}
  .brand .mark{color:var(--vb-muted);font-size:13px;font-weight:650}
  .badge{display:inline-grid;place-items:center;min-height:32px;padding:0 12px;border:1px solid var(--vb-line);border-radius:6px;background:#161616;color:var(--vb-text);font-family:var(--font-mono);font-size:12px;font-weight:650}
  .note{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);width:100%}
</style></head><body>
  <div class="brand"><span class="mark">OC</span><span>Verbeam</span></div>
  <div class="badge">LTH</div>
  <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">通用翻譯軟體</span>
  <div class="note">No logo asset exists — recreate marks with text, never as an image.</div>
</body></html>
