<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="px-anchored; body = 13px" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-app);font-family:var(--font-sans);color:var(--text-body);display:grid;gap:9px}
  .r{display:flex;align-items:baseline;gap:14px}
  .r .lab{width:70px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .r .px{width:48px;font-family:var(--font-mono);font-size:10px;color:var(--text-faint);text-align:right}
</style></head><body>
  <div class="r"><span class="lab">lg</span><span class="px">15px</span><span style="font-size:15px;font-weight:640">Settings section title</span></div>
  <div class="r"><span class="lab">md</span><span class="px">14px</span><span style="font-size:14px">Viewer source text</span></div>
  <div class="r"><span class="lab">base</span><span class="px">13px</span><span style="font-size:13px">Body & default control text</span></div>
  <div class="r"><span class="lab">sm</span><span class="px">12px</span><span style="font-size:12px;color:var(--text-muted)">Descriptions, footer, meta, tables</span></div>
  <div class="r"><span class="lab">xs</span><span class="px">11px</span><span style="font-size:11px;font-family:var(--font-mono);color:var(--text-label)">section labels · pills</span></div>
  <div class="r"><span class="lab">2xs</span><span class="px">10px</span><span style="font-size:10px;font-family:var(--font-mono);color:var(--text-muted)">RAIL BADGE · KICKER</span></div>
</body></html>
