<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="Compact 2px-based scale" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-app);display:grid;gap:7px}
  .r{display:flex;align-items:center;gap:12px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .r .lab{width:64px}
  .bar{height:12px;background:var(--vb-blue);border-radius:2px}
</style></head><body>
  <div class="r"><span class="lab">2 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="lab">4 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="lab">6 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="lab">8 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="lab">10 · 20px</span><div class="bar" style="width:20px"></div></div>
  <div class="r"><span class="lab">12 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="lab">18 · 36px</span><div class="bar" style="width:36px"></div></div>
  <div class="r"><span class="lab">20 · 40px</span><div class="bar" style="width:40px"></div></div>
</body></html>
