<!-- @dsCard group="Colors" viewport="700x150" name="Base neutral ramp" subtitle="Near-black surfaces, darkest → lightest" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-app)}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border:1px solid var(--vb-line);border-radius:var(--radius-md);overflow:hidden}
  .chip{height:52px}
  .meta{padding:7px 8px;font-family:var(--font-mono);font-size:10px;line-height:1.5}
  .name{color:var(--text-body)}
  .hex{color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#090909"></div><div class="meta"><div class="name">bg</div><div class="hex">#090909</div></div></div>
    <div class="sw"><div class="chip" style="background:#121212"></div><div class="meta"><div class="name">rail</div><div class="hex">#121212</div></div></div>
    <div class="sw"><div class="chip" style="background:#161616"></div><div class="meta"><div class="name">panel</div><div class="hex">#161616</div></div></div>
    <div class="sw"><div class="chip" style="background:#1e1e1e"></div><div class="meta"><div class="name">panel-2</div><div class="hex">#1e1e1e</div></div></div>
    <div class="sw"><div class="chip" style="background:#1f1f1f"></div><div class="meta"><div class="name">line</div><div class="hex">#1f1f1f</div></div></div>
    <div class="sw"><div class="chip" style="background:#2d2d2d"></div><div class="meta"><div class="name">line-strong</div><div class="hex">#2d2d2d</div></div></div>
  </div>
</body></html>
