<!-- @dsCard group="Colors" viewport="700x150" name="Accents" subtitle="One blue for action; green / amber / red for state" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-app)}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border:1px solid var(--vb-line);border-radius:var(--radius-md);overflow:hidden}
  .chip{height:52px}
  .meta{padding:7px 8px;font-family:var(--font-mono);font-size:10px;line-height:1.5}
  .name{color:var(--text-body)}
  .hex{color:var(--text-muted)}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--vb-blue)"></div><div class="meta"><div class="name">blue · action</div><div class="hex">#3b82f6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vb-blue-hover)"></div><div class="meta"><div class="name">blue hover</div><div class="hex">#2563eb</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vb-green)"></div><div class="meta"><div class="name">green · live</div><div class="hex">#22c55e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vb-amber)"></div><div class="meta"><div class="name">amber · idle</div><div class="hex">#d6b86a</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--vb-red)"></div><div class="meta"><div class="name">red · error</div><div class="hex">#ef4444</div></div></div>
  </div>
</body></html>
