<!-- @dsCard group="Spacing" viewport="700x160" name="Radii & cards" subtitle="Small radii; flat hairline cards, no shadow" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-app);display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
  .box{display:grid;gap:7px;justify-items:center}
  .s{width:64px;height:48px;background:var(--vb-panel-2);border:1px solid var(--vb-line-strong)}
  .lab{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head><body>
  <div class="box"><div class="s" style="border-radius:4px"></div><span class="lab">xs · 4px</span></div>
  <div class="box"><div class="s" style="border-radius:6px"></div><span class="lab">md · 6px</span></div>
  <div class="box"><div class="s" style="border-radius:8px"></div><span class="lab">lg · 8px</span></div>
  <div class="box"><div class="s" style="border-radius:12px"></div><span class="lab">xl · 12px</span></div>
  <div class="box"><div class="s" style="border-radius:999px;width:48px"></div><span class="lab">pill</span></div>
</body></html>
