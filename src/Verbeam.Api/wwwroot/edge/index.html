<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Verbeam Edge Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --surface: #1e1e1e;
      --text: #f5f5f5;
      --primary: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
    }

    body {
      margin: 0;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      box-sizing: border-box;
    }

    header {
      padding: 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 999px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warning);
    }

    .status.connected .dot {
      background: var(--success);
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .source-text {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
    }

    .translated-text {
      font-size: 1.125rem;
      line-height: 1.5;
      font-weight: 500;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #emptyState {
      text-align: center;
      color: rgba(255,255,255,0.4);
      margin-top: 40px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Verbeam Edge</h1>
    <div id="status" class="status">
      <div class="dot"></div>
      <span id="statusText">Connecting</span>
    </div>
  </header>

  <main id="log">
    <div id="emptyState">Waiting for translation...</div>
  </main>

  <script>
    const log = document.getElementById('log');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const emptyState = document.getElementById('emptyState');

    let reconnectTimer = null;
    let ws = null;
    let lastKey = null;

    // Use localhost:5757 assuming adb reverse tcp:5757 tcp:5757 is active
    const WS_URL = "ws://localhost:5757/broadcast";

    function setStatus(text, connected) {
      statusText.textContent = text;
      status.classList.toggle('connected', connected);
    }

    function addMessage(data) {
      if (!data || data.type !== 'translation') return;
      if (!data.translatedText && !data.sourceText) return;

      const key = data.id || data.stableKey || data.translatedText;
      if (key && key === lastKey) return;
      lastKey = key;

      if (emptyState) {
        emptyState.style.display = 'none';
      }

      const el = document.createElement('div');
      el.className = 'message';

      let html = '';
      if (data.sourceText) {
        html += `<div class="source-text">${data.sourceText}</div>`;
      }
      if (data.translatedText) {
        html += `<div class="translated-text">${data.translatedText}</div>`;
      }

      el.innerHTML = html;
      log.prepend(el);

      // Keep only last 50 items
      if (log.children.length > 50) {
        log.lastElementChild.remove();
      }
    }

    function connect() {
      clearTimeout(reconnectTimer);
      setStatus('Connecting', false);

      try {
        ws = new WebSocket(WS_URL);
      } catch (e) {
        setStatus('Error', false);
        reconnectTimer = setTimeout(connect, 3000);
        return;
      }

      ws.onopen = () => {
        setStatus('Live', true);
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          addMessage(data);
        } catch (e) {
          console.error("Parse error", e);
        }
      };

      ws.onclose = () => {
        setStatus('Offline', false);
        ws = null;
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = (e) => {
        ws.close();
      };
    }

    // Keep screen on if supported (Screen Wake Lock API)
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          await navigator.wakeLock.request('screen');
        }
      } catch (err) {
        console.log("Wake Lock error:", err);
      }
    }
    document.addEventListener('click', requestWakeLock, { once: true });

    connect();
  </script>
</body>
</html>
